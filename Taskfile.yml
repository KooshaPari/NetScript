version: '3'

tasks:
  validate:
    desc: Check Rust formatting and compile checks
    cmds:
      - cargo fmt --all -- --check
      - cargo check --workspace --all-targets

  build:
    desc: Compile all workspace crates and targets
    cmds:
      - cargo build --workspace --all-targets

  test:
    desc: Run all workspace tests
    cmds:
      - cargo test --workspace --all-targets

  lint:
    desc: Run clippy lints across workspace
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings
